draw_config:
  svg_extra_style: |
    svg.keymap { font-family: 'Inter', 'SF Pro Text', 'Helvetica Neue', 'Apple Symbols', 'Apple Color Emoji', system-ui, sans-serif; font-weight: 500; }
    text.label { font-weight: 700; letter-spacing: 0.3px; }
    text.tap { font-size: 15px; }
    text.hold { font-size: 11px; }
    text.shifted { font-size: 10px; opacity: 0.7; }
parse_config:
  trans_legend:
    t: ''
    type: trans
  raw_binding_map:
    "&bt BT_SEL 0": {t: ᛒ, h: '0'}
    "&bt BT_SEL 1": {t: ᛒ, h: '1'}
    "&bt BT_SEL 2": {t: ᛒ, h: '2'}
    "&bt BT_SEL 3": {t: ᛒ, h: '3'}
    "&bt BT_SEL 4": {t: ᛒ, h: '4'}
    "&bt BT_CLR": ᛒ✕
  zmk_keycode_map:
    EXCLAMATION: '!'
    EXCL: '!'
    AT_SIGN: '@'
    AT: '@'
    HASH: '#'
    POUND: '#'
    DOLLAR: $
    DLLR: $
    PERCENT: '%'
    PRCNT: '%'
    CARET: ^
    AMPERSAND: '&'
    AMPS: '&'
    ASTERISK: '*'
    ASTRK: '*'
    STAR: '*'
    LEFT_PARENTHESIS: (
    LPAR: (
    RIGHT_PARENTHESIS: )
    RPAR: )
    EQUAL: '='
    PLUS: +
    MINUS: '-'
    UNDERSCORE: _
    UNDER: _
    SLASH: /
    FSLH: /
    QUESTION: '?'
    QMARK: '?'
    BACKSLASH: \
    BSLH: \
    PIPE: '|'
    NON_US_BACKSLASH: \
    PIPE2: '|'
    NON_US_BSLH: '|'
    SEMICOLON: ;
    SEMI: ;
    COLON: ':'
    SINGLE_QUOTE: ''''
    SQT: ''''
    APOSTROPHE: ''''
    APOS: ''''
    DOUBLE_QUOTES: '"'
    DQT: '"'
    COMMA: ','
    LESS_THAN: <
    LT: <
    PERIOD: .
    DOT: .
    GREATER_THAN: '>'
    GT: '>'
    LEFT_BRACKET: '['
    LBKT: '['
    LEFT_BRACE: '{'
    LBRC: '{'
    RIGHT_BRACKET: ']'
    RBKT: ']'
    RIGHT_BRACE: '}'
    RBRC: '}'
    GRAVE: '`'
    TILDE: '~'
    NON_US_HASH: '#'
    NUHS: '#'
    TILDE2: '~'
    LSHFT: ⇧
    RSHFT: ⇧
    LEFT_SHIFT: ⇧
    RIGHT_SHIFT: ⇧
    LCTRL: ⌃
    RCTRL: ⌃
    LEFT_CONTROL: ⌃
    RIGHT_CONTROL: ⌃
    LALT: ⌥
    RALT: ⌥
    LEFT_ALT: ⌥
    RIGHT_ALT: ⌥
    LCMD: ⌘
    RCMD: ⌘
    LGUI: ⌘
    RGUI: ⌘
    LEFT_GUI: ⌘
    RIGHT_GUI: ⌘
    LEFT_COMMAND: ⌘
    RIGHT_COMMAND: ⌘
    SPACE: ␣
    SPC: ␣
    RET: ⏎
    RETURN: ⏎
    ENTER: ⏎
    ENT: ⏎
    BSPC: ⌫
    BACKSPACE: ⌫
    DEL: ⌦
    DELETE: ⌦
    TAB: ⇥
    ESC: ⎋
    ESCAPE: ⎋
    C_VOL_UP: VOL+
    C_VOLUME_UP: VOL+
    C_VOL_DN: VOL-
    C_VOLUME_DOWN: VOL-
    C_MUTE: MUTE
    C_PP: PLAY
    C_PLAY_PAUSE: PLAY
    C_NEXT: NEXT
    C_PREV: PREV
    C_BRI_UP: ☀︎+
    C_BRI_DN: ☀︎-
    UP: ↑
    DOWN: ↓
    LEFT: ←
    RIGHT: →
    BT_CLR: ᛒ✕
  modifier_fn_map:
    left_ctrl: ⌃
    right_ctrl: ⌃
    left_shift: ⇧
    right_shift: ⇧
    left_alt: ⌥
    right_alt: ⌥
    left_gui: ⌘
    right_gui: ⌘
    keycode_combiner: '{mods}{key}'
    mod_combiner: '{mod_1}{mod_2}'
    special_combinations:
      left_ctrl+left_alt+left_gui+left_shift: Hyper
      left_ctrl+left_alt+left_shift: Meh
