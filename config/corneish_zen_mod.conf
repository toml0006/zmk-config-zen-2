# go to sleep after one hour (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# USB device stack. The custom battery widget in this shield previously
# needed it to render charging state; left enabled defensively so the
# `usb_present` check in set_battery_symbol always has a real answer.
CONFIG_USB_DEVICE_STACK=y

# Battery reporting via the BQ274xx fuel gauge on I2C1. The widget
# reads SENSOR_CHAN_GAUGE_STATE_OF_CHARGE directly from the sensor,
# so we force STATE_OF_CHARGE fetch mode and explicitly enable
# sensor + battery reporting (these aren't reliably auto-implied in
# recent ZMK/Zephyr builds).
CONFIG_SENSOR=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORTING_FETCH_MODE_STATE_OF_CHARGE=y
