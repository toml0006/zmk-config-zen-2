# go to sleep after one hour (1*60*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Force-enable USB device stack — the Corne-ish Zen's custom battery widget
# guards its entire set_battery_symbol() body on CONFIG_USB_DEVICE_STACK, and
# Zephyr 4.1 (pulled in via ZMK main) no longer auto-enables it through the
# old `if USB` Kconfig tree. Without this the battery icon renders as an
# LVGL placeholder (the "!" boxed icon).
CONFIG_USB_DEVICE_STACK=y

# Explicitly enable battery reporting + ADC. In Zephyr 4.1 / recent ZMK
# these stopped being auto-implied by the zmk,battery chosen node +
# battery-voltage-divider driver, so the ADC sensor never gets probed and
# zmk_battery_state_of_charge() always returns 0 → widget shows batt_0.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ADC=y
CONFIG_SENSOR=y

# Force state-of-charge fetch mode. The Kconfig choice
# ZMK_BATTERY_REPORTING_FETCH_MODE has no explicit default in ZMK main,
# which means builds can land on LITHIUM_VOLTAGE mode. That mode calls
# sensor_sample_fetch_chan(battery, SENSOR_CHAN_VOLTAGE), but the
# voltage divider driver only accepts SENSOR_CHAN_GAUGE_VOLTAGE /
# SENSOR_CHAN_GAUGE_STATE_OF_CHARGE / SENSOR_CHAN_ALL and rejects the
# plain SENSOR_CHAN_VOLTAGE with -ENOTSUP, so zmk_battery_update()
# always fails and last_state_of_charge stays 0.
CONFIG_ZMK_BATTERY_REPORTING_FETCH_MODE_STATE_OF_CHARGE=y
